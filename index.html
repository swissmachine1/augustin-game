<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Augustin Game — A career in 5 mini-games</title>
    <meta name="description" content="A playable CV by Augustin Romaneschi. Five career chapters. Five mini-games." />
    <meta property="og:title" content="The Augustin Game" />
    <meta property="og:description" content="A playable CV. Five career chapters. Five mini-games." />
    <meta property="og:type" content="website" />
    <meta name="theme-color" content="#0a0a0a" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Caveat:wght@400;600&display=swap" />

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; }
      body {
        background: #0a0a0a;
        overflow: hidden;
        font-family: 'Space Mono', 'Courier New', monospace;
        color: #f5f0e6;
      }
      #game {
        display: flex;
        justify-content: center;
        align-items: center;
        width: 100vw;
        height: 100vh;
        position: relative;
      }

      /* ── Mobile gate ──────────────────────────────────────────── */
      #game.mobile-gate {
        display: block;
        overflow-y: auto;
        background: #0a0a0a;
      }
      .mobile-page {
        max-width: 460px;
        margin: 0 auto;
        padding: 48px 24px 40px;
        color: #f5f0e6;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }
      .m-tag {
        display: inline-block;
        padding: 5px 12px;
        background: #ff2d1f;
        color: #0a0a0a;
        font-family: 'Space Mono', monospace;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 2px;
        margin-bottom: 24px;
        transform: rotate(-3deg);
        border: 2px solid #0a0a0a;
        box-shadow: 4px 4px 0 #f5f0e6;
        align-self: flex-start;
      }
      .m-title {
        font-family: 'Archivo Black', 'Arial Black', sans-serif;
        font-size: 62px;
        line-height: 0.9;
        color: #f5f0e6;
        margin-bottom: 6px;
        text-transform: uppercase;
        position: relative;
      }
      .m-title::after {
        content: "THE AUGUSTIN GAME";
        position: absolute;
        top: 4px; left: 4px;
        color: #ff2d1f;
        z-index: -1;
      }
      .m-sub {
        font-family: 'Space Mono', monospace;
        font-size: 13px;
        color: #c7c7c7;
        letter-spacing: 1px;
        margin: 24px 0 0;
        border-top: 2px solid #f5f0e6;
        border-bottom: 2px solid #f5f0e6;
        padding: 10px 0;
        text-transform: uppercase;
      }
      .m-note {
        margin: 36px 0;
      }
      .m-note p {
        font-family: 'Space Mono', monospace;
        font-size: 15px;
        line-height: 1.6;
        color: #f5f0e6;
        margin-bottom: 14px;
      }
      .m-note strong { color: #ff2d1f; font-weight: 700; }
      .m-copy {
        display: inline-block;
        align-self: flex-start;
        margin-top: 24px;
        padding: 14px 22px;
        background: #f5f0e6;
        border: 3px solid #0a0a0a;
        box-shadow: 6px 6px 0 #ff2d1f;
        color: #0a0a0a;
        font-family: 'Archivo Black', sans-serif;
        font-size: 16px;
        letter-spacing: 2px;
        cursor: pointer;
        text-transform: uppercase;
        transition: transform 0.1s ease, box-shadow 0.1s ease;
      }
      .m-copy:active {
        transform: translate(6px, 6px);
        box-shadow: 0 0 0 #ff2d1f;
      }
      .m-sig {
        margin-top: 40px;
        font-family: 'Caveat', cursive;
        font-size: 32px;
        color: #ff2d1f;
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
